<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="八款以真實材質為靈感的 Codex 深色主題。預覽、複製並匯入設定。" />
    <meta property="og:title" content="Codex Material Themes" />
    <meta property="og:description" content="八款沉穩實用、適合長時間工作的 Codex 深色材質主題。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codex-themes.robinks.net/" />
    <meta property="og:image" content="https://codex-themes.robinks.net/og.png?v=8" />
    <meta property="og:image:width" content="1730" />
    <meta property="og:image:height" content="909" />
    <meta property="og:image:alt" content="Codex Material Themes：8 種深色材質外觀" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Codex Material Themes" />
    <meta name="twitter:description" content="八款沉穩實用、適合長時間工作的 Codex 深色材質主題。" />
    <meta name="twitter:image" content="https://codex-themes.robinks.net/og.png?v=8" />
    <script>
      const assetBase = location.protocol === "file:" ? "./public/" : "./";
      document.write(`<link rel="icon" href="${assetBase}favicon.svg"><link rel="stylesheet" href="${assetBase}site.css">`);
    </script>
    <title>Codex Material Themes</title>
  </head>
  <body>
    <main id="app"></main>
    <script>
      const catalogScript = document.createElement("script");
      catalogScript.src = `${assetBase}theme-catalog.js`;
      catalogScript.addEventListener("load", () => {
        const siteScript = document.createElement("script");
        siteScript.src = `${assetBase}site.js`;
        document.body.append(siteScript);
      });
      catalogScript.addEventListener("error", () => {
        document.querySelector("#app").textContent = "Theme catalog failed to load.";
      });
      document.body.append(catalogScript);
    </script>
  </body>
</html>
